name: PR CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

jobs:
  build-and-test:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild \
            -project BodyLapse.xcodeproj \
            -scheme BodyLapse \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            build

      - name: Test
        run: |
          xcodebuild \
            -project BodyLapse.xcodeproj \
            -scheme BodyLapse \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -only-testing:BodyLapseTests \
            test

      - name: Build (Release, device, signing disabled)
        # 出荷経路は Release 構成＋実機 SDK（testflight.yml がアーカイブする形）。
        # マージ後に main で初めて Release 固有のビルドエラーが発覚しないよう、
        # PR 段階で署名なしの Release ビルドを通しておく。
        run: |
          xcodebuild \
            -project BodyLapse.xcodeproj \
            -scheme BodyLapse \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
